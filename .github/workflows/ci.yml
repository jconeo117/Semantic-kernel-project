name: .NET CI Pipeline

on:
  push:
    branches: [ "main", "dev", "master" ]
  pull_request:
    branches: [ "main", "dev", "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: jhon0106
          POSTGRES_DB: receptionist_agent_core
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Initialize Mock Database for Tests
      run: |
        sudo apt-get install -y postgresql-client
        PGPASSWORD=jhon0106 psql -h localhost -U postgres -d receptionist_agent_core -c "CREATE TABLE tenants (tenant_id VARCHAR, business_name VARCHAR, business_type VARCHAR, db_type VARCHAR, connection_string VARCHAR, time_zone_id VARCHAR, phone_country_code VARCHAR, address VARCHAR, phone VARCHAR, working_hours VARCHAR, services TEXT, accepted_insurance TEXT, pricing TEXT, custom_settings TEXT, username VARCHAR, password_hash VARCHAR, message_provider VARCHAR, message_provider_account VARCHAR, message_provider_token VARCHAR, message_provider_phone VARCHAR, is_active BOOLEAN, created_at TIMESTAMP, updated_at TIMESTAMP);"

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        
    - name: Restore dependencies
      run: dotnet restore ReceptionistAgent.sln
      
    - name: Build solution
      run: dotnet build ReceptionistAgent.sln --no-restore --configuration Release
      
    - name: Run Unit Tests (ReceptionistAgent.Tests)
      run: dotnet test src/ReceptionistAgent.Tests --no-build --configuration Release --verbosity normal

    - name: Run Stress Tests (Requires Gemini Key)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # Ejecutar soolo si el secreto está configurado (para evitar gastar balance en PRs no autorizados o fallos por falta de token)
      if: "${{ env.GEMINI_API_KEY != '' }}"
      run: |
        # Configurar variables de entorno que .NET leerá
        export AI__Google__ApiKey="${{ secrets.GEMINI_API_KEY }}"
        export AI__Provider="Google"
        dotnet test src/ReceptionistAgent.StressTests --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=stress_test_results.trx"
